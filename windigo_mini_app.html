<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windigo Bot — Mini App</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;color:#e8e8f0;font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif}
:root{
  --neon:#e10600;
  --neon2:#ff3d2e;
  --surface:#13131a;
  --surface2:#1a1a24;
  --border:#2a2a3a;
  --text:#e8e8f0;
  --muted:#8888aa;
  --radius:12px
}
.app{background:#0a0a0f;min-height:100vh;max-width:420px;margin:0 auto;padding-bottom:80px}
.nav{display:grid;grid-template-columns:repeat(4,1fr);position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:#0d0d14;border-top:1px solid var(--border);z-index:100}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px 8px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:10px;transition:color .2s}
.nav-btn.active{color:var(--neon)}
.nav-btn i{font-size:22px}
.nav-btn.active i{text-shadow:0 0 8px rgba(225,6,0,.5)}
.page{display:none;padding:16px}
.page.active{display:block}
.header{padding:20px 16px 12px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#14141e 0%,transparent 100%)}
.header h1{font-size:18px;font-weight:500;letter-spacing:.5px}
.header span{color:var(--neon);font-weight:600}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;background:rgba(225,6,0,.15);color:var(--neon);border:1px solid rgba(225,6,0,.3)}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 12px}
.stat-card .label{font-size:11px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.stat-card .value{font-size:26px;font-weight:600;color:var(--text);line-height:1}
.stat-card .sub{font-size:12px;color:var(--muted);margin-top:4px}
.stat-card.accent{border-color:rgba(225,6,0,.4);background:rgba(225,6,0,.05)}
.stat-card.accent .value{color:var(--neon)}

.section-title{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin:20px 0 10px}

.streak-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px}
.streak-bar .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.streak-bar .title{font-size:14px;font-weight:500}
.progress-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--neon),#ff6b00);border-radius:3px;transition:width .6s ease}

.tag-list{display:flex;flex-direction:column;gap:8px}
.tag-row{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.tag-name{font-size:13px;font-weight:500;min-width:90px}
.tag-bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.tag-bar-fill{height:100%;background:var(--neon);border-radius:2px}
.tag-count{font-size:12px;color:var(--muted);min-width:28px;text-align:right}

.top-list{display:flex;flex-direction:column;gap:8px}
.top-row{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px}
.top-row.gold{border-color:rgba(255,200,0,.4);background:rgba(255,200,0,.04)}
.rank{font-size:16px;font-weight:600;min-width:24px;color:var(--muted)}
.rank.r1{color:#ffc800}
.rank.r2{color:#aaa}
.rank.r3{color:#cd7f32}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--text);flex-shrink:0}
.top-info{flex:1}
.top-name{font-size:14px;font-weight:500}
.top-sub{font-size:12px;color:var(--muted)}
.streak-num{font-size:16px;font-weight:600;color:var(--neon)}

.driver-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.driver-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 10px;cursor:pointer;text-align:left;transition:border-color .2s,background .2s;width:100%}
.driver-btn:hover{border-color:rgba(225,6,0,.5);background:rgba(225,6,0,.05)}
.driver-btn.selected{border-color:var(--neon);background:rgba(225,6,0,.1)}
.driver-name{font-size:13px;font-weight:500;color:var(--text);display:block;margin-top:4px}
.driver-team{font-size:11px;color:var(--muted);display:block;margin-top:2px}
.driver-flag{font-size:18px}
.confirm-btn{width:100%;margin-top:16px;padding:14px;background:var(--neon);border:none;border-radius:var(--radius);color:#fff;font-size:15px;font-weight:600;cursor:pointer;letter-spacing:.5px;transition:opacity .2s}
.confirm-btn:disabled{opacity:.3;cursor:default}
.confirm-btn:not(:disabled):hover{opacity:.9}
.voted-msg{text-align:center;padding:24px 16px;background:rgba(0,220,100,.06);border:1px solid rgba(0,220,100,.2);border-radius:var(--radius);color:#00dc64;font-size:14px;line-height:1.6}

.results-bar-row{margin-bottom:14px}
.results-bar-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.results-bar-name{font-size:13px;font-weight:500}
.results-bar-pct{font-size:13px;color:var(--muted)}
.results-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.results-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--neon),#ff6b00)}

.fest-list{display:flex;flex-direction:column;gap:10px}
.fest-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.fest-card .fest-name{font-size:15px;font-weight:500;margin-bottom:4px}
.fest-card .fest-date{font-size:12px;color:var(--muted);margin-bottom:12px}
.countdown{display:flex;gap:8px}
.count-block{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;text-align:center;flex:1}
.count-num{font-size:20px;font-weight:600;color:var(--neon);display:block;line-height:1}
.count-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.fest-card .link-btn{margin-top:12px;display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 10px;cursor:pointer;text-decoration:none}
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>Windigo <span>Bot</span> <span class="badge">Mini App</span></h1>
  </div>

  <div id="pg-stats" class="page active">
    <p class="section-title">Моя активность</p>
    <div class="stat-grid">
      <div class="stat-card accent">
        <div class="label">Текущий стрик</div>
        <div class="value">14</div>
        <div class="sub">дней подряд</div>
      </div>
      <div class="stat-card">
        <div class="label">Рекорд</div>
        <div class="value">31</div>
        <div class="sub">макс. стрик</div>
      </div>
      <div class="stat-card">
        <div class="label">Комментарии</div>
        <div class="value">247</div>
        <div class="sub">всего</div>
      </div>
      <div class="stat-card">
        <div class="label">Активный день</div>
        <div class="value" style="font-size:16px;margin-top:4px">пятница</div>
        <div class="sub">чаще всего</div>
      </div>
    </div>

    <div class="streak-bar">
      <div class="top">
        <span class="title">Прогресс к следующей неделе</span>
        <span class="badge">14 / 21</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:66%"></div></div>
    </div>

    <p class="section-title">Любимые теги</p>
    <div class="tag-list" id="tag-list"></div>
  </div>

  <div id="pg-top" class="page">
    <p class="section-title">По текущему стрику</p>
    <div class="top-list" id="top-list"></div>
  </div>

  <div id="pg-vote" class="page">
    <p class="section-title">Лучший гонщик сезона</p>
    <div id="vote-area"></div>
  </div>

  <div id="pg-fests" class="page">
    <p class="section-title">Ближайшие события</p>
    <div class="fest-list" id="fest-list"></div>
  </div>
</div>

<nav class="nav">
  <button class="nav-btn active" onclick="nav('stats',this)" aria-label="Статистика">
    <i class="ti ti-chart-bar" aria-hidden="true"></i>Статистика
  </button>
  <button class="nav-btn" onclick="nav('top',this)" aria-label="Топ">
    <i class="ti ti-trophy" aria-hidden="true"></i>Топ
  </button>
  <button class="nav-btn" onclick="nav('vote',this)" aria-label="Голосование">
    <i class="ti ti-flag-2" aria-hidden="true"></i>Голосование
  </button>
  <button class="nav-btn" onclick="nav('fests',this)" aria-label="Фестивали">
    <i class="ti ti-confetti" aria-hidden="true"></i>Фесты
  </button>
</nav>

<script>
function nav(page, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('pg-' + page).classList.add('active');
  btn.classList.add('active');
}

const tags = [
  {name:'#F1', count:89, pct:100},
  {name:'#Игры', count:61, pct:69},
  {name:'#Фильмы', count:47, pct:53},
  {name:'#Сериал', count:31, pct:35},
  {name:'#Аниме', count:19, pct:21},
];
const tl = document.getElementById('tag-list');
tags.forEach(t => {
  tl.innerHTML += `<div class="tag-row">
    <span class="tag-name">${t.name}</span>
    <div class="tag-bar"><div class="tag-bar-fill" style="width:${t.pct}%"></div></div>
    <span class="tag-count">${t.count}</span>
  </div>`;
});

const tops = [
  {n:'windigo_kz', streak:31, rank:1},
  {n:'alex_f1fan', streak:22, rank:2},
  {n:'marta_speed', streak:18, rank:3},
  {n:'nitro_boy', streak:14, rank:4},
  {n:'pit_lane99', streak:11, rank:5},
  {n:'velvet_racer', streak:9, rank:6},
];
const topList = document.getElementById('top-list');
const medals = ['🥇','🥈','🥉'];
tops.forEach((u,i) => {
  const isMe = u.streak === 14;
  topList.innerHTML += `<div class="top-row${i===0?' gold':''}">
    <span class="rank r${u.rank}">${medals[i]||u.rank}</span>
    <div class="avatar">${u.n.slice(0,2).toUpperCase()}</div>
    <div class="top-info">
      <div class="top-name">@${u.n}${isMe?' <span class="badge" style="font-size:10px">Ты</span>':''}</div>
      <div class="top-sub">активен сегодня</div>
    </div>
    <div class="streak-num">${u.streak} 🔥</div>
  </div>`;
});

const drivers = [
  {flag:'🇳🇱',name:'М. Ферстаппен',team:'Red Bull'},
  {flag:'🇬🇧',name:'Л. Норрис',team:'McLaren'},
  {flag:'🇲🇨',name:'Ш. Леклер',team:'Ferrari'},
  {flag:'🇬🇧',name:'Дж. Расселл',team:'Mercedes'},
  {flag:'🇦🇺',name:'О. Пиастри',team:'McLaren'},
  {flag:'🇬🇧',name:'Л. Хэмилтон',team:'Ferrari'},
  {flag:'🇪🇸',name:'Ф. Алонсо',team:'Aston Martin'},
  {flag:'🇧🇷',name:'Г. Бортолето',team:'Audi'},
];

let selected = null;
let voted = false;

const voteResults = {
  'М. Ферстаппен': 38, 'Л. Норрис': 24, 'О. Пиастри': 17,
  'Ш. Леклер': 9, 'Дж. Расселл': 5, 'Л. Хэмилтон': 4,
  'Ф. Алонсо': 2, 'Г. Бортолето': 1
};

function renderVote() {
  const va = document.getElementById('vote-area');
  if (voted) {
    const total = Object.values(voteResults).reduce((a,b)=>a+b,0);
    const sorted = Object.entries(voteResults).sort((a,b)=>b[1]-a[1]);
    let html = '<div class="voted-msg">✅<br>Голос принят! Спасибо 🙌</div>';
    html += '<p class="section-title" style="margin-top:20px">Результаты</p>';
    sorted.forEach(([name, cnt]) => {
      const pct = Math.round(cnt / total * 100);
      html += `<div class="results-bar-row">
        <div class="results-bar-top"><span class="results-bar-name">${name}</span><span class="results-bar-pct">${pct}%</span></div>
        <div class="results-track"><div class="results-fill" style="width:${pct}%"></div></div>
      </div>`;
    });
    va.innerHTML = html;
    return;
  }
  let grid = '<div class="driver-grid">';
  drivers.forEach(d => {
    grid += `<button class="driver-btn${selected===d.name?' selected':''}" onclick="pick('${d.name}')">
      <span class="driver-flag">${d.flag}</span>
      <span class="driver-name">${d.name}</span>
      <span class="driver-team">${d.team}</span>
    </button>`;
  });
  grid += '</div>';
  grid += `<button class="confirm-btn" ${!selected?'disabled':''} onclick="confirm_vote()">
    ${selected ? 'Подтвердить — ' + selected : 'Выбери гонщика'}
  </button>`;
  va.innerHTML = grid;
}

function pick(name) { selected = name; renderVote(); }
function confirm_vote() {
  if (!selected) return;
  voted = true;
  voteResults[selected] = (voteResults[selected]||0) + 1;
  renderVote();
}
renderVote();

const now = new Date();
const fests = [
  {name:'Comic Con Astana 2025', date: new Date(now.getFullYear(), 5, 14), link:'#'},
  {name:'Mora Festival', date: new Date(now.getFullYear(), 7, 2), link:'#'},
  {name:'F1 Grand Prix Казахстан', date: new Date(now.getFullYear(), 8, 20), link:'#'},
];

function timeTo(target) {
  const diff = target - now;
  if (diff <= 0) return null;
  const d = Math.floor(diff/86400000);
  const h = Math.floor((diff%86400000)/3600000);
  const m = Math.floor((diff%3600000)/60000);
  return {d,h,m};
}

const fl = document.getElementById('fest-list');
fests.forEach(f => {
  const t = timeTo(f.date);
  const dateStr = f.date.toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'});
  let countdown = '';
  if (t) {
    countdown = `<div class="countdown">
      <div class="count-block"><span class="count-num">${t.d}</span><div class="count-label">Дней</div></div>
      <div class="count-block"><span class="count-num">${t.h}</span><div class="count-label">Часов</div></div>
      <div class="count-block"><span class="count-num">${t.m}</span><div class="count-label">Минут</div></div>
    </div>`;
  } else {
    countdown = '<div style="color:var(--neon);font-size:13px">🎉 Уже идёт!</div>';
  }
  fl.innerHTML += `<div class="fest-card">
    <div class="fest-name">${f.name}</div>
    <div class="fest-date">${dateStr}</div>
    ${countdown}
    <a class="link-btn" href="${f.link}">🔗 Подробнее</a>
  </div>`;
});
</script>
</body>
</html>
